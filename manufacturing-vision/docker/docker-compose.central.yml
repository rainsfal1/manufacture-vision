services:
  redis:
    image: redis:7-alpine
    container_name: mvmvp-redis
    ports:
      - "6379:6379"
    volumes:
      - ../data/volumes/redis:/data
    command: redis-server --appendonly yes

  postgres:
    image: postgres:16-alpine
    container_name: mvmvp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mvision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mvision}
      POSTGRES_DB: ${POSTGRES_DB:-mvision}
    volumes:
      - ../data/volumes/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mvision"]
      interval: 10s
      timeout: 5s
      retries: 5

  central-backend:
    image: mvision/central-backend:latest
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
